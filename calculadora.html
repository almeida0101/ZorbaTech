<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Solar</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/styles-js.css">
</head>

<body>

<header>
    <h1>Zorbatech</h1>
    <div id="usuarioInfo"></div>
</header>

<main class="page-container">

    <section>
        <h2>Calculadora Solar</h2>

        <div class="form-group">
            <label>Consumo mensal (kWh)</label>
            <input id="consumo" type="number">
        </div>

        <div class="form-group">
            <label>Valor da conta (R$)</label>
            <input id="conta" type="number">
        </div>

        <div class="form-group">
            <label>Investimento (R$)</label>
            <input id="custoSistema" type="number">
        </div>

        <div class="form-group">
            <label>Irradiação (kWh/m²/dia)</label>
            <input id="irradiacao" type="number">
        </div>

        <button onclick="calcular()">Calcular</button>

        <div id="resultado"></div>

        <div class="acoes">
            <a href="index.html" class="btn">Voltar ao início</a>
            <a href="dashboards.html" class="btn">Ir para Dashboard</a>
        </div>

    </section>

</main>

<script src="js/calculadora.js"></script>
<script src="js/auth-ui.js"></script>

</body>
</html>
